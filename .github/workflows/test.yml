name: Build and Test
on:
  push:
    typescript
  pull_request:
    typescript
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'
      - name: Install dependencies
        run: npm install
      - name: Build and test
        run: npm run build && npm run test
      - name: Upload coverage
        uses: codecov/codecov-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: coverage/lcov.info
      - name: Deploy to AWS
        uses: aws-actions/deploy@v1
        with:
          bucket-name: eleanore-eleanore-artifacts
          object-key: eleanore-eleanore-artifacts/${GITHUB_RUN_ID}/coverage/lcov.info
          region: us-east-1
          profile: eleanore-eleanore-aws
      - name: Publish artifacts
        uses: actions/upload-artifact@v2
        with:
          name: coverage
          path: coverage/lcov.info
      - name: Upload to S3
        uses: aws-actions/s3@v1
        with:
          bucket-name: eleanore-eleanore-artifacts
          object-key: eleanore-eleanore-artifacts/${GITHUB_RUN_ID}/coverage/lcov.info
          region: us-east-1
          profile: eleanore-eleanore-aws
      - name: Publish to S3
        uses: actions/upload-artifact@v2
        with:
          name: artifact
          path: artifact/${GITHUB_RUN_ID}/coverage/lcov.info
      - name: Upload to S3
        uses: aws-actions/s3@v1
        with:
          bucket-name: eleanore-eleanore-artifacts
          object-key: eleanore-eleanore-artifacts/${GITHUB_RUN_ID}/coverage/lcov.info
          region: us-east-1
          profile: eleanore-eleanore-aws
      - name: Publish to S3
        uses: actions/upload-artifact@v2
        with:
          name: artifact
          path: artifact/${GITHUB_RUN_ID}/coverage/lcov.info
